<!DOCTYPE html>
<html lang="en">

<title> ookamitai's webpage</title>

<head>
	<meta http-equiv="content-type"
		content="text/html; charset=UTF-8">

	<meta name="viewport" content="width=device-width,
		minimum-scale=1,initial-scale=1">

	<script src=
		"https://code.jquery.com/jquery-3.3.1.min.js">
	</script>

	<script src=
"https://unpkg.com/jquery.terminal/js/jquery.terminal.min.js">
	</script>

	<script src=
"https://unpkg.com/jquery.terminal/js/autocomplete_menu.js">
	</script>

	<link rel="stylesheet" href=
"https://unpkg.com/jquery.terminal/css/jquery.terminal.min.css" />

	<style type="text/css">
		.terminal,
		span,
		.cmd,
		div {
			--color: rgb(255, 255, 255);
		}

		.terminal,
		span {
			--size: 1.4;
		}
	</style>
</head>

<body>
	<script>
		var pkg_list = {"crex": "https://github.com/ookamitai/cREX/releases/"};
		var username = "Guest";
		let curDate = new Date();
		function randomNumber(min, max) { 
    		return Math.floor(Math.random() * (max - min) + min);
		} 

		var quoteid = randomNumber(1, 100000);
		if (quoteid % 7 == 5){
			quoteid = "Hi, I'm ookamitai, with love.";
		}
		$('body').terminal({
			whoami: function () {
				this.echo('My name is Bian Junsen and I\'m currently in my second year in junior high school.\n' +
                'I now live in Nanjing, China and plans to go abroad for further study.\n' +
                'In my spare time, I casually make song covers with virtual singers.\n' +
				"If you are interested in it, you can click the link below to check it out!\n" +
				"https://space.bilibili.com/284102617/");
			},

			credits: function () {
				this.echo('Powered by jQuery.');
			},

            get_pkg: function (pkgname) {
				if (typeof str == "string"){
					pkgname = pkgname.toLowerCase()
				}
                if (pkgname in pkg_list) {
                    this.echo('Retrieving package...');
					window.open(pkg_list[pkgname], "_blank");
					this.echo('Opened the page in a new tab.');
                } else if (pkgname == '-list'){
					this.echo('Available packages:\n' + Object.keys(pkg_list));
				} else {
					this.echo('Package not found!');
					this.echo('Please use \'get_pkg -list\' to view a list of available')
				}
			},

			echo: function (text) {
				this.echo(text);
			},

			help: function () {
				this.echo('whoami - a brief introduction of myself! \n' +
                'credits - show credits \n' +
                "get_pkg [pkgname] - retrieve a package \n" +
				"echo - print out strings on screen \n"+
				"clear - clear the screen \n"+
				"update - show update log");
			},

			update: function () {
				this.echo("5/15 Added TAB completion.\n"+
				"5/17 Added NOD (Number Of the Day) for future purposes :3")
			}
		}, 
		{greetings: 'Welcome to ookamitai\'s webpage!\nUse \'help\' for a list of commands.\nLogin time: ' + Date() + "\n\nNumber of the day: " + quoteid + "\n", 
		prompt: '[' + username + '@' + (curDate.getHours()*3600 + curDate.getMinutes()*60 + curDate.getSeconds()).toString(16).toUpperCase() + ']> ', 
		completion: ['whoami', 'credits', 'get_pkg', 'clear', 'help', 'echo', 'update'],
		autocompleteMenu: false});

	</script>
</body>

</html>
