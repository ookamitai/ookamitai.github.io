<!DOCTYPE html>
<html lang="en">

<head>
	<meta http-equiv="content-type"
		content="text/html; charset=UTF-8">

	<meta name="viewport" content="width=device-width,
		minimum-scale=1,initial-scale=1">

	<script src=
		"https://code.jquery.com/jquery-3.3.1.min.js">
	</script>

	<script src=
"https://unpkg.com/jquery.terminal/js/jquery.terminal.min.js">
	</script>

	<link rel="stylesheet" href=
"https://unpkg.com/jquery.terminal/css/jquery.terminal.min.css" />

	<style type="text/css">
		.terminal,
		span,
		.cmd,
		div {
			--color: rgb(255, 255, 255);
		}

		.terminal,
		span {
			--size: 1.4;
		}
	</style>
</head>

<body>
	<script>
		$('body').terminal({
			whoami: function () {
				this.echo('My name is Bian Junsen and I\'m currently in my second year in junior high school.\n' +
                'I now live in Nanjing, China and plans to go abroad for further study.' +
                'In my spare time');
			},
			credits: function () {
				this.echo('Powered by jQuery.');
			},
            get_pkg: function (pkgname) {
				this.echo('Package name: ' + pkgname);
                if (pkgname.toLowerCase() == "crex") {
                    this.echo('Retrieving package...');
                    window.open("https://github.com/ookamitai/cREX/releases/tag/v0.1b", "_blank");
                } else if (pkgname.toLowerCase() == '-list'){
					this.echo('Available packages:\ncrex\n');
				} else {
					this.echo('Package not found!');
					this.echo('Please use \'get_pkg -list\' to view a list of available')
				}
			},
			help: function () {
				this.echo('whoami - a brief introduction of me! \n'+
                'credits - show credits. \n'+
                "get_pkg [pkgname] - retrieve a package");
			},
            
		}, {
			greetings: 'Welcome to ookamitai\'s webpage!\nUse \'help\' for a list of commands.'
		});
	</script>
</body>

</html>
